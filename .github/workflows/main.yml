name: Update Exoplanet Rankings

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run exoplanet script
        run: python scripts/retrieve_catalogue.py -d data/exoplanet_catalogue.db -u -e --top10 --output data/top10_esi.json

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/top10_esi.json
          git diff --cached --quiet || git commit -m "chore: update exoplanet rankings"
          git push
